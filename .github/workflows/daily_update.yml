name: Daily Publication Scraper

on:
  schedule:
    - cron: '0 4 * * *'  # Runs at 04:00 UTC daily
  workflow_dispatch:      # Allows manual trigger button

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Required to push the CSV back to the repo
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas plotly streamlit

      - name: Run Scraper
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }} # Securely injected
        run: python scraper.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/lcds_publications.csv
          git commit -m "Auto-update publications data [skip ci]" || echo "No changes to commit"
          git push
