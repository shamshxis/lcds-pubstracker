name: LCDS Scraper

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch: # Allows manual run

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install requests beautifulsoup4 pandas lxml

    - name: Run Scraper
      env:
        USER_EMAIL: ${{ secrets.USER_EMAIL }} # Add this to GitHub Secrets if you have one, or hardcode in scraper
      run: |
        python scraper.py

    - name: Commit and Push
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add data/lcds_publications.csv
        git commit -m "Auto-update publications data" || echo "No changes to commit"
        git push
