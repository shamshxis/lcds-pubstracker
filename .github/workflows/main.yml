name: LCDS Scraper

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch: # Allows manual run

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # Ensures we pull full history to avoid conflicts

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install requests pandas beautifulsoup4 plotly streamlit lxml

    - name: Run Scraper
      run: python scraper.py

    - name: Commit and Push
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add data/lcds_publications.csv
        # Commit changes if any
        git commit -m "Auto-update publications data" || echo "No changes to commit"
        
        # THE FIX: Pull latest changes from remote and rebase before pushing
        git pull --rebase origin main
        
        git push origin main
